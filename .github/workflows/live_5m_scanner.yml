name: Live 5M Scanner

on:
  schedule:
    - cron: '*/30 * * * *'   # Runs every 30 minutes
  workflow_dispatch:          # Allows manual trigger

permissions:
  contents: write             # Required to push state file updates

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run 5M live scanner
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python live_5m_scanner.py

      - name: Commit state file updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update signal state [skip ci]"
          git push
